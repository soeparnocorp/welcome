name = "id-readtalk"
type = "typescript"
compatibility_date = "2026-03-03"
account_id = "53d61c09062b1ca11788fa763f79313a"

[build]
command = "npm run build"
upload.format = "service-worker"
upload.dir = "/dist"

# Service Pages Functions:
[[services]]
binding = "OPENAUTH"
service = "openauth"
environment = "production"

[[services]]
binding = "ACCOUNT"
service = "account"
environment = "production"

# D1 Database
[[d1_databases]]
binding = "PAGES_DB"
database_name = "readtalk_db"
database_id = "ff653b9c-4e2c-479d-8aa4-497da62de3c5"

# KV
[[kv_namespaces]]
binding = "PAGES_KV"
id = "13a468e30cc84fe58ff6297d799050f2"

# R2
[[r2_buckets]]
binding = "PAGES_STORAGE"
bucket_name = "readtalk-r2"
