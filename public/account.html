<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>READTalk</title>
  <style>
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
    iframe { width: 100%; height: 100%; border: none; }
  </style>
</head>
<body>
  <iframe id="chatFrame" src="about:blank"></iframe>
  
  <script>
    const params = new URLSearchParams(window.location.search);
    const userId = params.get('userId') || localStorage.getItem('userId');
    const email = params.get('email') || localStorage.getItem('email');
    
    if (!userId || !email) {
      window.location.href = '/';
    } else {
      localStorage.setItem('userId', userId);
      localStorage.setItem('email', email);
      
      document.getElementById('chatFrame').src = 
        `https://account.soeparnocorp.workers.dev?userId=${userId}&email=${encodeURIComponent(email)}`;
    }
  </script>
</body>
</html>
