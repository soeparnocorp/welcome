<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>READTalk</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
    }
    
    .chat-iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    
    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: system-ui;
    }
  </style>
</head>
<body>
  <!-- Loading indicator -->
  <div class="loading" id="loading">Loading chat...</div>
  
  <!-- iframe account worker -->
  <iframe 
    id="chatFrame"
    class="chat-iframe"
    src="about:blank"
    onload="document.getElementById('loading').style.display='none'"
    allow="camera; microphone"
  ></iframe>

  <script>
    // URL parameter localStorage
    const params = new URLSearchParams(window.location.search)
    const userId = params.get('userId') || localStorage.getItem('userId')
    const username = params.get('username') || localStorage.getItem('username')
    
    // iframe account worker parameter
    const frame = document.getElementById('chatFrame')
    frame.src = `https://account.soeparnocorp.workers.dev?userId=${userId}&username=${encodeURIComponent(username)}`
    
    // next visit
    if (userId) localStorage.setItem('userId', userId)
    if (username) localStorage.setItem('username', username)
    
    // Listen iframe (optional)
    window.addEventListener('message', (event) => {
      if (event.data.type === 'LOGOUT') {
        // Clear data dan redirect ke home
        localStorage.clear()
        window.location.href = '/'
      }
    })
  </script>
</body>
</html>
