<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>READTalk - Room</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: sans-serif;
      background-color: #f5f5f5;
    }
    button {
      padding: 12px 24px;
      font-size: 18px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      background-color: #ff4b00;
      color: white;
    }
    button:hover {
      background-color: #ff3300;
    }
  </style>
</head>
<body>
  <button id="logoutBtn">Logout</button>

  <script>
    document.getElementById('logoutBtn').addEventListener('click', () => {
      // Hapus session di KV atau localStorage jika perlu
      localStorage.clear();
      // Redirect kembali ke index.html
      window.location.href = '/index.html';
    });
  </script>
</body>
</html>
