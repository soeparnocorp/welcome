<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>READTalk Profile</title>
  <style>
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    iframe { width: 100%; height: 100%; border: none; }
    .loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: #666; }
    .error { padding: 20px; text-align: center; color: #f44336; }
  </style>
</head>
<body>
  <iframe id="chatFrame" src="about:blank" allow="camera; microphone"></iframe>
  
  <script>
    // Tampilkan loading
    const showLoading = () => {
      const loader = document.createElement('div');
      loader.className = 'loading';
      loader.id = 'loading';
      loader.innerHTML = '⏳ Loading READTalk...';
      document.body.appendChild(loader);
    };
    
    const hideLoading = () => {
      const loader = document.getElementById('loading');
      if (loader) loader.remove();
    };
    
    // Ambil parameter dari URL
    const params = new URLSearchParams(window.location.search);
    const userId = params.get('userId');
    const email = params.get('email');
    const username = params.get('username') || email?.split('@')[0] || 'Guest';
    const welcome = params.get('welcome');
    
    // Validasi parameter
    if (!userId || !email) {
      document.body.innerHTML = `
        <div class="error">
          <h2>⛔ Missing Login Information</h2>
          <p>Please <a href="/api/login" style="color:#ff0000;">login</a> first.</p>
        </div>
      `;
      throw new Error('Access denied - missing parameters');
    }
    
    // Simpan ke localStorage profile.html (untuk keperluan profile)
    try {
      localStorage.setItem('profile_userId', userId);
      localStorage.setItem('profile_email', email);
      localStorage.setItem('profile_username', username);
    } catch (e) {
      console.warn('LocalStorage not available:', e);
    }
    
    // Tampilkan loading
    showLoading();
    
    // Dapatkan iframe element
    const iframe = document.getElementById('chatFrame');
    
    // Set source iframe dengan parameter
    const chatUrl = `https://account.soeparnocorp.workers.dev?userId=${encodeURIComponent(userId)}&email=${encodeURIComponent(email)}&username=${encodeURIComponent(username)}${welcome ? '&welcome=true' : ''}`;
    
    iframe.src = chatUrl;
    
    // Handler ketika iframe selesai loading
    iframe.onload = () => {
      hideLoading();
      console.log('✅ Chatroom loaded for user:', userId);
      
      // Opsional: Kirim data tambahan via postMessage
      setTimeout(() => {
        iframe.contentWindow.postMessage({
          type: 'PROFILE_READY',
          userId: userId,
          email: email,
          username: username
        }, 'https://account.soeparnocorp.workers.dev');
      }, 1000);
    };
    
    // Handler error iframe
    iframe.onerror = () => {
      hideLoading();
      document.body.innerHTML += '<div class="error">Failed to load chatroom. Please try again.</div>';
    };
    
    // Terima pesan dari chatroom
    window.addEventListener('message', (event) => {
      // Validasi origin
      if (event.origin !== 'https://account.soeparnocorp.workers.dev') return;
      
      const data = event.data;
      
      if (data.type === 'ROOM_READY') {
        console.log('✅ Room ready for user:', data.userId);
        // Bisa update UI profile.html jika perlu
      }
      
      if (data.type === 'USER_JOINED') {
        console.log('👤 User joined:', data.username);
      }
    });
    
    // Bersih-bersih
    window.addEventListener('beforeunload', () => {
      // Kirim sinyal ke chatroom jika perlu
      if (iframe.contentWindow) {
        iframe.contentWindow.postMessage({ type: 'PROFILE_UNLOAD' }, 'https://account.soeparnocorp.workers.dev');
      }
    });
  </script>
</body>
</html>
