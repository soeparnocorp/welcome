<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>READTalk</title>
  <meta name="theme-color" content="#ff0000">
  <style>
    /* ===== VISUAL READTALK MERAH ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --readtalk: #ff0000;
      --readtalk-dark: #cc0000;
      --bg-primary: #ffffff;
      --bg-secondary: #f5f5f5;
      --text-primary: #333333;
      --text-secondary: #666666;
      --border-color: #e0e0e0;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      padding: 20px;
      min-height: 100vh;
    }
    
    .container {
      max-width: 500px;
      margin: 0 auto;
    }
    
    .header {
      background: var(--readtalk);
      color: white;
      padding: 24px;
      border-radius: 16px;
      text-align: center;
      margin-bottom: 20px;
    }
    
    .layer {
      background: var(--bg-secondary);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      border: 1px solid var(--border-color);
    }
    
    .layer h2 {
      color: var(--readtalk);
      font-size: 18px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    input, textarea {
      width: 100%;
      padding: 14px;
      border: 1px solid var(--border-color);
      border-radius: 12px;
      font-size: 16px;
      background: var(--bg-primary);
      color: var(--text-primary);
    }
    
    .avatar-preview {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: var(--bg-primary);
      border: 3px solid var(--readtalk);
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      color: var(--text-secondary);
    }
    
    .upload-btn {
      background: var(--readtalk);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 30px;
      cursor: pointer;
      display: block;
      margin: 0 auto;
      font-weight: 600;
    }
    
    .info-box {
      background: var(--bg-primary);
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 12px;
      font-family: monospace;
      word-break: break-all;
      border: 1px solid var(--border-color);
    }
    
    .label {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }
    
    .btn-group {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }
    
    .btn-primary, .btn-danger {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
    }
    
    .btn-primary {
      background: var(--readtalk);
      color: white;
    }
    
    .btn-danger {
      background: transparent;
      color: #f44336;
      border: 1px solid #f44336;
    }
  </style>
</head>
<body>
  <div class="container" id="app">
    <div class="header">
      <h1>⚡ READTalk</h1>
      <p>Account Settings</p>
    </div>
    
    <div class="layer">
      <h2>👤 Your Name</h2>
      <input type="text" id="nameInput" placeholder="Enter your name">
    </div>
    
    <div class="layer">
      <h2>🖼️ Profile Picture</h2>
      <div class="avatar-preview" id="avatarPreview">👤</div>
      <input type="file" id="avatarInput" accept="image/*" hidden>
      <button class="upload-btn" id="uploadBtn">Choose Image</button>
    </div>
    
    <div class="layer">
      <h2>⚙️ Account Info</h2>
      <div class="label">User ID</div>
      <div class="info-box" id="userIdDisplay"></div>
      
      <div class="label">Email</div>
      <div class="info-box" id="emailDisplay"></div>
      
      <div class="label">About</div>
      <textarea id="aboutInput" rows="4" placeholder="Tell something about yourself..."></textarea>
      
      <div class="btn-group">
        <button class="btn-primary" id="saveBtn">Save Changes</button>
        <button class="btn-danger" id="deleteBtn">Delete Account</button>
      </div>
    </div>
  </div>

  <script>
    // Ambil params dari URL
    const params = new URLSearchParams(location.search);
    const userId = params.get('userId');
    const email = params.get('email');
    const username = params.get('username') || '';

    // Tampilkan data dasar
    document.getElementById('userIdDisplay').textContent = userId || '-';
    document.getElementById('emailDisplay').textContent = email || '-';
    document.getElementById('nameInput').value = username;

    // Avatar upload
    document.getElementById('uploadBtn').addEventListener('click', () => {
      document.getElementById('avatarInput').click();
    });

    document.getElementById('avatarInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (e) => {
          document.getElementById('avatarPreview').innerHTML = `<img src="${e.target.result}" style="width:100%; height:100%; object-fit:cover;">`;
        };
        reader.readAsDataURL(file);
      }
    });

    // Load profile dari API
    async function loadProfile() {
      if (!userId || !email) return;
      
      try {
        const res = await fetch(`/api/user/${userId}?email=${encodeURIComponent(email)}`);
        const data = await res.json();
        
        if (data.exists !== false && !data.error) {
          document.getElementById('nameInput').value = data.name || username;
          document.getElementById('aboutInput').value = data.about || '';
          
          if (data.avatar) {
            document.getElementById('avatarPreview').innerHTML = `<img src="${data.avatar}" style="width:100%; height:100%; object-fit:cover;">`;
          }
        }
      } catch (err) {
        console.error('Failed to load profile:', err);
      }
    }

    // Save profile
    async function saveProfile() {
      const name = document.getElementById('nameInput').value.trim();
      if (!name) return alert('Name is required');

      const about = document.getElementById('aboutInput').value;
      const avatarImg = document.querySelector('#avatarPreview img');
      const avatar = avatarImg ? avatarImg.src : '';

      try {
        const check = await fetch(`/api/user/${userId}?email=${encodeURIComponent(email)}`);
        const checkData = await check.json();
        
        let response;
        if (checkData.exists === false || checkData.error) {
          response = await fetch(`/api/user/${userId}?email=${encodeURIComponent(email)}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ identitas: userId, name, avatar, about })
          });
        } else {
          response = await fetch(`/api/user/${userId}?email=${encodeURIComponent(email)}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, avatar, about })
          });
        }
        
        const result = await response.json();
        if (result.success) {
          alert('Profile saved!');
          localStorage.setItem('username', name);
        } else {
          alert('Error: ' + (result.error || 'Unknown error'));
        }
      } catch (err) {
        console.error('Failed to save:', err);
        alert('Failed to save profile');
      }
    }

    // Delete account
    async function deleteAccount() {
      if (!confirm('Delete account? This cannot be undone.')) return;
      alert('Delete endpoint not implemented');
    }

    // Event listeners
    document.getElementById('saveBtn').addEventListener('click', saveProfile);
    document.getElementById('deleteBtn').addEventListener('click', deleteAccount);

    // Load profile
    loadProfile();
  </script>
</body>
</html>
