<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>READTalk</title>
  <style>
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
    iframe { width: 100%; height: 100%; border: none; }
  </style>
</head>
<body>
  <iframe id="chatFrame" src="about:blank"></iframe>
  
  <script>
    // LANGSUNG AMBIL DARI URL, BUKAN DARI WINDOW.USER_DATA
    const params = new URLSearchParams(window.location.search);
    const userId = params.get('userId');
    const email = params.get('email');
    const username = params.get('username') || 'Guest'; // Default kalo kosong
    
    // CEK APAKAH PARAMETER LENGKAP?
    if (!userId || !email) {
      // TIDAK ADA PARAMETER → LANGSUNG TAMPILIN PESAN, BUKAN REDIRECT!
      document.body.innerHTML = `
        <div style="padding:20px; text-align:center;">
          <h2>Missing Login Information</h2>
          <p>Please <a href="/api/login">login</a> first.</p>
        </div>
      `;
    } else {
      // ADA PARAMETER → LANGSUNG LOAD CHAT
      localStorage.setItem('userId', userId);
      localStorage.setItem('email', email);
      localStorage.setItem('username', username);
      
      document.getElementById('chatFrame').src = 
        `https://chat.soeparnocorp.workers.dev?userId=${userId}&email=${encodeURIComponent(email)}&username=${encodeURIComponent(username)}`;
    }
  </script>
</body>
</html>
