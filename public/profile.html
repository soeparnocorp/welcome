<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Account Settings</title>
  <meta name="theme-color" content="#ff0000">
  <style>
    /* ===== VISUAL READTALK MERAH ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --readtalk: #ff0000;
      --readtalk-dark: #cc0000;
      --bg-primary: #ffffff;
      --bg-secondary: #f5f5f5;
      --text-primary: #333333;
      --text-secondary: #666666;
      --border-color: #e0e0e0;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      padding: 20px;
      min-height: 100vh;
    }
    
    .container {
      max-width: 500px;
      margin: 0 auto;
    }
    
    .header {
      background: var(--readtalk);
      color: white;
      padding: 24px;
      border-radius: 16px;
      text-align: center;
      margin-bottom: 20px;
    }
    
    .layer {
      background: var(--bg-secondary);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      border: 1px solid var(--border-color);
    }
    
    .layer h2 {
      color: var(--readtalk);
      font-size: 18px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    input, textarea {
      width: 100%;
      padding: 14px;
      border: 1px solid var(--border-color);
      border-radius: 12px;
      font-size: 16px;
      background: var(--bg-primary);
      color: var(--text-primary);
    }
    
    .avatar-preview {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: var(--bg-primary);
      border: 3px solid var(--readtalk);
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .upload-btn {
      background: var(--readtalk);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 30px;
      cursor: pointer;
      display: block;
      margin: 0 auto;
    }
    
    .info-box {
      background: var(--bg-primary);
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 12px;
      font-family: monospace;
    }
    
    .btn-group {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }
    
    .btn-primary, .btn-danger {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
    }
    
    .btn-primary {
      background: var(--readtalk);
      color: white;
    }
    
    .btn-danger {
      background: transparent;
      color: #f44336;
      border: 1px solid #f44336;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>⚡ READTalk</h1>
      <p>Account Settings</p>
    </div>
    
    <div class="layer">
      <h2>👤 Your Name</h2>
      <input type="text" id="nameInput" placeholder="Enter your name">
    </div>
    
    <div class="layer">
      <h2>🖼️ Profile Picture</h2>
      <div class="avatar-preview" id="avatarPreview">👤</div>
      <input type="file" id="avatarInput" accept="image/*" hidden>
      <button class="upload-btn" id="uploadBtn">Choose Image</button>
    </div>
    
    <div class="layer">
      <h2>⚙️ Account Info</h2>
      <div class="info-box" id="userId"></div>
      <div class="info-box" id="userEmail"></div>
      <textarea id="aboutInput" rows="3" placeholder="About you..."></textarea>
      
      <div class="btn-group">
        <button class="btn-primary" id="saveBtn">Save</button>
        <button class="btn-danger" id="deleteBtn">Delete</button>
      </div>
    </div>
  </div>
  
  <script>
    const params = new URLSearchParams(location.search);
    const userId = params.get('userId');
    const email = params.get('email');
    const username = params.get('username') || '';
    
    document.getElementById('userId').textContent = userId;
    document.getElementById('userEmail').textContent = email;
    document.getElementById('nameInput').value = username;
    
    // API calls, dll...
  </script>
</body>
</html>
