<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>READTalk - Profile</title>
  <meta name="theme-color" content="#ff0000">
  <style>
    /* CSS LENGKAP (sama seperti yang lo kasih) */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --readtalk: #ff0000;
      --readtalk-dark: #cc0000;
      --readtalk-light: #ff3333;
      --readtalk-bg: #fff0f0;
      --bg-primary: #ffffff;
      --bg-secondary: #f5f5f5;
      --text-primary: #333333;
      --text-secondary: #666666;
      --border-color: #e0e0e0;
      --roster-bg: #f8f9fa;
      --online-color: #4caf50;
      --offline-color: #9e9e9e;
      --header-bg: #ff0000;
      --hover-color: #fff0f0;
    }

    body.dark-mode {
      --bg-primary: #1a1a1a;
      --bg-secondary: #2d2d2d;
      --text-primary: #ffffff;
      --text-secondary: #b0b0b0;
      --border-color: #404040;
      --roster-bg: #252525;
      --header-bg: #cc0000;
      --hover-color: #332222;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
      transition: background-color 0.3s, color 0.3s;
    }

    /* HEADER */
    #app-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 48px;
      background-color: var(--header-bg);
      border-bottom: 1px solid rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      padding: 0 16px;
      z-index: 100;
    }

    #header-title {
      flex: 1;
      font-weight: 600;
      font-size: 18px;
      color: white;
    }

    #back-button {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      margin-right: 12px;
      color: white;
      padding: 4px 8px;
    }

    #back-button:hover {
      background-color: #cc0000;
      border-radius: 4px;
    }

    /* MAIN CONTENT */
    #main-container {
      position: fixed;
      top: 48px;
      bottom: 0;
      left: 0;
      right: 0;
      overflow-y: auto;
      padding: 20px;
    }

    .profile-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .profile-avatar {
      width: 120px;
      height: 120px;
      background-color: var(--readtalk-light);
      border-radius: 50%;
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      color: white;
    }

    .profile-name {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .profile-email {
      color: var(--text-secondary);
      margin-bottom: 20px;
    }

    .profile-section {
      background-color: var(--bg-secondary);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .section-title {
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--readtalk);
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--border-color);
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .info-label {
      color: var(--text-secondary);
    }

    .info-value {
      font-weight: 500;
    }

    .edit-button {
      background-color: var(--readtalk);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 24px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-top: 20px;
    }

    .edit-button:hover {
      background-color: var(--readtalk-dark);
    }

    /* DARK MODE TOGGLE */
    #theme-toggle {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 48px;
      height: 48px;
      background-color: var(--readtalk);
      color: white;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      font-size: 20px;
      z-index: 1000;
    }
  </style>
</head>
<body>
  <!-- HEADER -->
  <header id="app-header">
    <button id="back-button" onclick="history.back()">←</button>
    <div id="header-title">Profile Settings</div>
  </header>

  <!-- MAIN CONTENT -->
  <div id="main-container">
    <div class="profile-header">
      <div class="profile-avatar" id="avatarDisplay">👤</div>
      <div class="profile-name" id="displayName">Loading...</div>
      <div class="profile-email" id="displayEmail"></div>
    </div>

    <div class="profile-section">
      <div class="section-title">Personal Information</div>
      <div class="info-row">
        <span class="info-label">Display Name</span>
        <span class="info-value" id="infoName">-</span>
      </div>
      <div class="info-row">
        <span class="info-label">Email</span>
        <span class="info-value" id="infoEmail">-</span>
      </div>
      <div class="info-row">
        <span class="info-label">Member Since</span>
        <span class="info-value" id="infoJoined">-</span>
      </div>
    </div>

    <div class="profile-section">
      <div class="section-title">Account Settings</div>
      <div class="info-row" onclick="alert('Edit profile coming soon')">
        <span class="info-label">Edit Profile</span>
        <span class="info-value">→</span>
      </div>
      <div class="info-row" onclick="alert('Change password coming soon')">
        <span class="info-label">Change Password</span>
        <span class="info-value">→</span>
      </div>
      <div class="info-row" onclick="alert('Privacy settings coming soon')">
        <span class="info-label">Privacy</span>
        <span class="info-value">→</span>
      </div>
    </div>

    <button class="edit-button" onclick="alert('Edit mode coming soon')">
      Edit Profile
    </button>
  </div>

  <!-- DARK MODE TOGGLE -->
  <button id="theme-toggle" onclick="document.body.classList.toggle('dark-mode')">🌓</button>

  <script>
    // ========== SISTEM RESPON LINK ==========
    (function() {
      // AMBIL PARAMETER DARI URL
      const params = new URLSearchParams(window.location.search);
      const userId = params.get('userId');
      const email = params.get('email');
      const username = params.get('username') || 'Guest';
      
      // CEK PARAMETER - BLOK TANPA PARAMETER!
      if (!userId || !email) {
        document.body.innerHTML = `
          <div style="padding:20px; text-align:center; margin-top:50px;">
            <h2>Missing Login Information</h2>
            <p>Please <a href="/api/login">login</a> first.</p>
          </div>
        `;
        return;
      }
      
      // SIMPAN DI LOCALSTORAGE
      localStorage.setItem('userId', userId);
      localStorage.setItem('email', email);
      localStorage.setItem('username', username);
      
      // TAMPILKAN DATA
      document.getElementById('displayName').textContent = username;
      document.getElementById('displayEmail').textContent = email;
      document.getElementById('infoName').textContent = username;
      document.getElementById('infoEmail').textContent = email;
      
      // AMBIL DATA TAMBAHAN (MEMBER SINCE, DLL) DARI KV/API
      fetch(`/api/user-data?userId=${userId}`)
        .then(res => res.json())
        .then(data => {
          if (data.joined) {
            document.getElementById('infoJoined').textContent = new Date(data.joined).toLocaleDateString('id-ID');
          }
        })
        .catch(() => {
          document.getElementById('infoJoined').textContent = 'Recently';
        });
    })();
  </script>
</body>
</html>
