<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>READTalk</title>
  <style>
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    
    /* LAYER 2: FORM CONTROL (di profile.html) */
    #form-layer {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      z-index: 200;
      width: 90%;
      max-width: 400px;
      display: none;
      text-align: center;
    }
    
    #form-layer input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 2px solid #e0e0e0;
      border-radius: 24px;
      font-size: 16px;
      box-sizing: border-box;
    }
    
    #form-layer button {
      background: #ff0000;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 24px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
    
    #form-layer button:hover {
      background: #cc0000;
    }
    
    #form-layer .close {
      position: absolute;
      top: 10px;
      right: 10px;
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: #666;
      width: auto;
      padding: 5px 10px;
    }
    
    iframe { 
      width: 100%; 
      height: 100%; 
      border: none; 
    }
    
    .toggle-form {
      position: fixed;
      bottom: 30px;
      right: 20px;
      background: #ff0000;
      color: white;
      border: none;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      font-size: 24px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      z-index: 250;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .toggle-form:hover {
      background: #cc0000;
    }
  </style>
</head>
<body>
  <!-- LAYER 2: FORM CONTROL (mirror form) -->
  <div id="form-layer">
    <button class="close" id="closeForm">✖️</button>
    <h3 style="color: #ff0000; margin-bottom: 10px;">Buat Room Baru</h3>
    <input type="text" id="roomNameInput" placeholder="Nama room..." maxlength="32">
    <button id="createRoomBtn">✨ Public Room</button>
    <p style="font-size: 12px; color: #666; margin-top: 10px;">Room akan langsung dibuat di chatroom</p>
  </div>
  
  <!-- TOMBOL TOGGLE FORM -->
  <button class="toggle-form" id="toggleForm">➕</button>
  
  <!-- IFRAME (chatroom) -->
  <iframe id="chatFrame" src="about:blank" allow="camera; microphone"></iframe>
  
  <script>    
    // Ambil parameter dari URL
    const params = new URLSearchParams(window.location.search);
    const userId = params.get('userId');
    const email = params.get('email');
    const username = params.get('username') || email?.split('@')[0] || 'Guest';
    
    // Validasi parameter
    if (!userId || !email) {      
      document.body.innerHTML = `
        <div style="padding:20px; text-align:center;">
          <h2>⛔ Missing Login Information</h2>
          <p>Please <a href="/api/login">login</a> first.</p>
        </div>
      `;
      throw new Error('Access denied - missing parameters');
    }
    
    // Simpan di localStorage profile
    localStorage.setItem('userId', userId);
    localStorage.setItem('email', email);
    localStorage.setItem('username', username);
    
    // Dapatkan iframe element
    const iframe = document.getElementById('chatFrame');
    const formLayer = document.getElementById('form-layer');
    
    // Set source iframe dengan parameter
    const chatUrl = `https://account.soeparnocorp.workers.dev?userId=${encodeURIComponent(userId)}&email=${encodeURIComponent(email)}&username=${encodeURIComponent(username)}`;
    iframe.src = chatUrl;
    
    // Kirim data user ke iframe via postMessage setelah load
    iframe.onload = () => {
      setTimeout(() => {
        iframe.contentWindow.postMessage({
          type: 'PROFILE_READY',
          userId: userId,
          email: email,
          username: username
        }, 'https://account.soeparnocorp.workers.dev');
      }, 1000);
    };
    
    // ===== FORM CONTROL =====
    const toggleBtn = document.getElementById('toggleForm');
    const closeForm = document.getElementById('closeForm');
    const createBtn = document.getElementById('createRoomBtn');
    const roomInput = document.getElementById('roomNameInput');
    
    // Toggle form
    toggleBtn.addEventListener('click', () => {
      if (formLayer.style.display === 'none' || !formLayer.style.display) {
        formLayer.style.display = 'block';
        toggleBtn.textContent = '✖️';
      } else {
        formLayer.style.display = 'none';
        toggleBtn.textContent = '➕';
      }
    });
    
    // Close form
    closeForm.addEventListener('click', () => {
      formLayer.style.display = 'none';
      toggleBtn.textContent = '➕';
    });
    
    // Create room button
    createBtn.addEventListener('click', () => {
      const roomName = roomInput.value.trim();
      if (!roomName) {
        alert('Masukkan nama room');
        return;
      }
      
      // Kirim perintah ke iframe
      iframe.contentWindow.postMessage({
        type: 'CREATE_PUBLIC_ROOM',
        roomName: roomName,
        userId: userId
      }, 'https://account.soeparnocorp.workers.dev');
      
      // Kosongkan input
      roomInput.value = '';
      
      // Tutup form
      formLayer.style.display = 'none';
      toggleBtn.textContent = '➕';
    });
    
    // Terima pesan dari chatroom
    window.addEventListener('message', (event) => {
      if (event.origin !== 'https://account.soeparnocorp.workers.dev') return;
      
      const data = event.data;
      
      if (data.type === 'ROOM_CREATED') {
        console.log('✅ Room created:', data.roomName);
        // Bisa tampilkan notifikasi singkat
        alert(`Room ${data.roomName} created!`);
      }
    });
  </script>
</body>
</html>
