<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>READTalk - Profile</title>
  <style>
    /* Mirror dari CSS index.html */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f5f5f5;
      --text-primary: #333333;
      --border-color: #e0e0e0;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      height: 100vh;
      overflow: hidden;
    }
    
    /* LAYER 1: ROOM FORM (mirror dari index.html) */
    #room-form {
      position: fixed;
      z-index: 200;
      top: 0;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--bg-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    /* LAYER 2: NAME FORM (mirror dari index.html) */
    #name-form {
      position: fixed;
      z-index: 200;
      top: 0;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--bg-primary);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .form-content {
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    
    .form-content h2 {
      margin-bottom: 24px;
      color: #ff0000;
    }
    
    .form-content input {
      width: 100%;
      height: 48px;
      border: 2px solid var(--border-color);
      border-radius: 24px;
      padding: 0 20px;
      font-size: 16px;
      background: var(--bg-secondary);
      margin-bottom: 16px;
    }
    
    .form-content input:focus {
      border-color: #ff0000;
      outline: none;
    }
    
    .form-content button {
      height: 48px;
      border: none;
      border-radius: 24px;
      padding: 0 32px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      background: #ff0000;
      color: white;
      width: 100%;
    }
    
    .form-content button:hover {
      background: #cc0000;
    }
    
    .or-divider {
      margin: 24px 0;
      color: #666;
      position: relative;
    }
    
    .or-divider::before,
    .or-divider::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 45%;
      height: 1px;
      background: var(--border-color);
    }
    
    .or-divider::before { left: 0; }
    .or-divider::after { right: 0; }
  </style>
</head>
<body>
  <!-- LAYER 1: ROOM FORM (mirror index.html) -->
  <div id="room-form">
    <div class="form-content">
      <h2>Welcome to READTalk</h2>
      <input type="text" id="room-name" placeholder="Room Name..." maxlength="14">
      <button id="go-public">Public Room</button>
      <div class="or-divider">or</div>
      <button id="go-private">Private Room</button>
    </div>
  </div>
  
  <!-- LAYER 2: NAME FORM (mirror index.html) -->
  <div id="name-form">
    <div class="form-content">
      <h2>Choose Your Name</h2>
      <input type="text" id="name-input" placeholder="Your name" maxlength="32">
      <button id="join-chat">Check In</button>
      <p style="margin-top: 20px; color: #666;">Private chat on the edge<br>with Cloudflare Durable Objects</p>
    </div>
  </div>
  
  <script>
    // Ambil parameter dari URL
    const params = new URLSearchParams(window.location.search);
    const userId = params.get('userId');
    const email = params.get('email');
    
    if (!userId || !email) {
      document.body.innerHTML = `<div style="padding:20px;"><h2>⛔ Missing Login</h2></div>`;
      throw new Error('Access denied');
    }
    
    // Cek localStorage
    const savedRoom = localStorage.getItem('room_name');
    const savedName = localStorage.getItem('username');
    
    const roomForm = document.getElementById('room-form');
    const nameForm = document.getElementById('name-form');
    const roomInput = document.getElementById('room-name');
    const nameInput = document.getElementById('name-input');
    const publicBtn = document.getElementById('go-public');
    const privateBtn = document.getElementById('go-private');
    const joinBtn = document.getElementById('join-chat');
    
    // Jika sudah punya data, langsung ke name form
    if (savedRoom && savedName) {
      roomForm.style.display = 'none';
      nameForm.style.display = 'flex';
      nameInput.value = savedName;
    }
    
    // Public Room
    publicBtn.addEventListener('click', () => {
      const room = roomInput.value.trim();
      if (!room) return;
      
      // Simpan room
      localStorage.setItem('room_name', room);
      
      // Pindah ke name form
      roomForm.style.display = 'none';
      nameForm.style.display = 'flex';
    });
    
    // Private Room
    privateBtn.addEventListener('click', async () => {
      try {
        privateBtn.disabled = true;
        const response = await fetch(`https://account.soeparnocorp.workers.dev/api/room`, { method: 'POST' });
        const roomId = await response.text();
        
        localStorage.setItem('room_name', roomId);
        
        roomForm.style.display = 'none';
        nameForm.style.display = 'flex';
      } catch (err) {
        alert('Failed to create private room');
      } finally {
        privateBtn.disabled = false;
      }
    });
    
    // Check In
    joinBtn.addEventListener('click', () => {
      const name = nameInput.value.trim();
      if (!name) return;
      
      // Simpan name
      localStorage.setItem('username', name);
      localStorage.setItem('userId', userId);
      localStorage.setItem('email', email);
      
      // Dapatkan room dari localStorage
      const room = localStorage.getItem('room_name');
      
      // Redirect ke chatroom.html dengan parameter
      window.location.href = `chatroom.html?userId=${encodeURIComponent(userId)}&email=${encodeURIComponent(email)}&username=${encodeURIComponent(name)}&room=${encodeURIComponent(room)}`;
    });
  </script>
</body>
</html>
