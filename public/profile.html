<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>READTalk</title>
  <meta name="theme-color" content="#ff0000">
  
  <style>
    /* ===== SISTEM IFRAME YANG DIPERTAHANKAN ===== */
    body, html { 
      margin: 0; 
      padding: 0; 
      min-height: 100vh;
      background-color: #f5f5f5;
    }
    
    /* ===== VISUAL READTALK MERAH ===== */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --readtalk: #ff0000;
      --readtalk-dark: #cc0000;
      --readtalk-light: #ff3333;
      --readtalk-bg: #fff0f0;
      --bg-primary: #ffffff;
      --bg-secondary: #f5f5f5;
      --text-primary: #333333;
      --text-secondary: #666666;
      --border-color: #e0e0e0;
    }

    body.dark-mode {
      --bg-primary: #1a1a1a;
      --bg-secondary: #2d2d2d;
      --text-primary: #ffffff;
      --text-secondary: #b0b0b0;
      --border-color: #404040;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      transition: background-color 0.3s, color 0.3s;
      padding: 20px;
    }

    .profile-container {
      max-width: 500px;
      margin: 0 auto;
    }

    /* HEADER READTALK */
    .readtalk-header {
      background-color: var(--readtalk);
      color: white;
      padding: 24px;
      border-radius: 16px;
      margin-bottom: 24px;
      text-align: center;
      box-shadow: 0 4px 12px rgba(255,0,0,0.2);
    }

    .readtalk-header h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .readtalk-header p {
      opacity: 0.9;
      font-size: 14px;
    }

    /* LAYER CARDS */
    .layer-card {
      background-color: var(--bg-secondary);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 20px;
      border: 1px solid var(--border-color);
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .layer-title {
      color: var(--readtalk);
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--border-color);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* FORM ELEMENTS */
    .input-field {
      width: 100%;
      padding: 16px;
      border: 1px solid var(--border-color);
      border-radius: 30px;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-size: 16px;
      transition: all 0.2s;
    }

    .input-field:focus {
      outline: none;
      border-color: var(--readtalk);
      box-shadow: 0 0 0 3px rgba(255,0,0,0.1);
    }

    textarea.input-field {
      border-radius: 20px;
      resize: vertical;
    }

    /* AVATAR */
    .avatar-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .avatar-preview {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background-color: var(--bg-primary);
      border: 3px solid var(--readtalk);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(255,0,0,0.2);
    }

    .avatar-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .avatar-preview .placeholder {
      color: var(--text-secondary);
      font-size: 48px;
    }

    .upload-btn {
      background-color: var(--readtalk);
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
    }

    .upload-btn:hover {
      background-color: var(--readtalk-dark);
      transform: scale(1.02);
    }

    /* INFO BOXES */
    .info-box {
      background-color: var(--bg-primary);
      padding: 16px;
      border-radius: 16px;
      border: 1px solid var(--border-color);
      margin-bottom: 16px;
    }

    .info-label {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .info-value {
      font-size: 16px;
      word-break: break-all;
      font-family: monospace;
    }

    /* BUTTONS */
    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .btn-primary, .btn-danger {
      flex: 1;
      padding: 16px;
      border: none;
      border-radius: 40px;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
    }

    .btn-primary {
      background-color: var(--readtalk);
      color: white;
    }

    .btn-primary:hover {
      background-color: var(--readtalk-dark);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(255,0,0,0.3);
    }

    .btn-danger {
      background-color: transparent;
      color: #f44336;
      border: 1px solid #f44336;
    }

    .btn-danger:hover {
      background-color: rgba(244,67,54,0.05);
      transform: translateY(-2px);
    }

    /* DARK MODE TOGGLE */
    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 40px;
      padding: 12px 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 100;
      font-size: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    /* STATUS MESSAGE */
    .status-message {
      padding: 16px;
      border-radius: 16px;
      margin-bottom: 20px;
      display: none;
      text-align: center;
      font-weight: 500;
    }

    .status-success {
      background-color: #4caf50;
      color: white;
    }

    .status-error {
      background-color: #f44336;
      color: white;
    }

    /* MISSING INFO PAGE */
    .missing-info {
      text-align: center;
      padding: 60px 20px;
    }

    .missing-info h2 {
      color: var(--readtalk);
      margin-bottom: 16px;
    }

    .missing-info p {
      color: var(--text-secondary);
      margin-bottom: 24px;
    }

    .missing-info a {
      color: var(--readtalk);
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="theme-toggle" id="themeToggle">
    <span>🌓</span>
    <span>Day/Night</span>
  </div>

  <div id="statusMessage" class="status-message"></div>
  <div id="mainContent"></div>

  <script>
    (function() {
      // ============================================
      // SISTEM 1: BACA PARAMS (PERSIS SEPERTI IFRAME)
      // ============================================
      const params = new URLSearchParams(window.location.search);
      let userId = params.get('userId');
      let email = params.get('email');
      let username = params.get('username') || 'Guest';

      // ============================================
      // SISTEM 2: CEK VALIDASI (PERSIS SEPERTI IFRAME)
      // ============================================
      if (!userId || !email) {
        document.getElementById('mainContent').innerHTML = `
          <div class="missing-info">
            <h2>Missing Login Information</h2>
            <p>Please login first.</p>
            <a href="/">Go to Home</a>
          </div>
        `;
        return;
      }

      // ============================================
      // SISTEM 3: SIMPAN KE LOCALSTORAGE (PERSIS SEPERTI IFRAME)
      // ============================================
      localStorage.setItem('userId', userId);
      localStorage.setItem('email', email);
      localStorage.setItem('username', username);

      // ============================================
      // SISTEM 4: TAMPILKAN UI (MENGGANTIKAN IFRAME)
      // ============================================
      document.getElementById('mainContent').innerHTML = `
        <div class="profile-container">
          <!-- HEADER -->
          <div class="readtalk-header">
            <h1>⚡ READTalk</h1>
            <p>Account Settings</p>
          </div>

          <!-- LAYER 1: YOUR NAME -->
          <div class="layer-card">
            <div class="layer-title">
              <span>👤</span> Your Name
            </div>
            <input type="text" id="displayName" class="input-field" placeholder="Enter your name" maxlength="32" value="${username}">
          </div>

          <!-- LAYER 2: PROFILE PICTURE -->
          <div class="layer-card">
            <div class="layer-title">
              <span>🖼️</span> Profile Picture
            </div>
            <div class="avatar-section">
              <div class="avatar-preview" id="avatarPreview">
                <span class="placeholder">👤</span>
              </div>
              <input type="file" id="avatarInput" accept="image/*" style="display: none;">
              <button class="upload-btn" id="uploadBtn">
                <span>📁</span> Choose Image
              </button>
            </div>
          </div>

          <!-- LAYER 3: ACCOUNT MANAGEMENT -->
          <div class="layer-card">
            <div class="layer-title">
              <span>⚙️</span> Account Management
            </div>
            
            <div class="info-box">
              <div class="info-label">User ID</div>
              <div class="info-value" id="userId">${userId}</div>
            </div>
            
            <div class="info-box">
              <div class="info-label">Email</div>
              <div class="info-value" id="userEmail">${email}</div>
            </div>
            
            <textarea id="about" class="input-field" rows="4" placeholder="Tell something about yourself..."></textarea>
            
            <div class="button-group">
              <button class="btn-primary" id="saveBtn">
                <span>💾</span> Save
              </button>
              <button class="btn-danger" id="deleteBtn">
                <span>🗑️</span> Delete
              </button>
            </div>
          </div>
        </div>
      `;

      // ============================================
      // SISTEM TAMBAHAN: DARK MODE
      // ============================================
      let isDarkMode = localStorage.getItem('dark_mode') === 'true';
      if (isDarkMode) document.body.classList.add('dark-mode');

      document.getElementById('themeToggle').addEventListener('click', () => {
        isDarkMode = !isDarkMode;
        document.body.classList.toggle('dark-mode', isDarkMode);
        localStorage.setItem('dark_mode', isDarkMode);
      });

      // ============================================
      // FUNGSI: SHOW STATUS
      // ============================================
      function showStatus(message, type) {
        const statusEl = document.getElementById('statusMessage');
        statusEl.textContent = message;
        statusEl.className = `status-message status-${type}`;
        statusEl.style.display = 'block';
        setTimeout(() => {
          statusEl.style.display = 'none';
        }, 3000);
      }

      // ============================================
      // AVATAR UPLOAD
      // ============================================
      document.getElementById('uploadBtn')?.addEventListener('click', () => {
        document.getElementById('avatarInput').click();
      });

      document.getElementById('avatarInput')?.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (e) => {
            document.getElementById('avatarPreview').innerHTML = `<img src="${e.target.result}" alt="Avatar">`;
          };
          reader.readAsDataURL(file);
        }
      });

      // ============================================
      // LOAD PROFILE
      // ============================================
      async function loadProfile() {
        try {
          const res = await fetch(\`/api/user/\${userId}?email=\${encodeURIComponent(email)}\`);
          const data = await res.json();
          
          if (data.exists !== false && !data.error) {
            document.getElementById('displayName').value = data.name || username;
            document.getElementById('about').value = data.about || '';
            
            if (data.avatar) {
              document.getElementById('avatarPreview').innerHTML = `<img src="${data.avatar}" alt="Avatar">`;
            }
          }
        } catch (err) {
          console.error('Failed to load profile:', err);
        }
      }

      // ============================================
      // SAVE PROFILE
      // ============================================
      async function saveProfile() {
        const name = document.getElementById('displayName').value.trim();
        if (!name) {
          showStatus('Name is required', 'error');
          return;
        }

        const about = document.getElementById('about').value;
        const avatarImg = document.querySelector('#avatarPreview img');
        const avatar = avatarImg ? avatarImg.src : '';

        try {
          showStatus('Saving...', 'success');
          
          const check = await fetch(\`/api/user/\${userId}?email=\${encodeURIComponent(email)}\`);
          const checkData = await check.json();
          
          let response;
          if (checkData.exists === false || checkData.error) {
            response = await fetch(\`/api/user/\${userId}?email=\${encodeURIComponent(email)}\`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ 
                identitas: userId, 
                name, 
                avatar, 
                about 
              })
            });
          } else {
            response = await fetch(\`/api/user/\${userId}?email=\${encodeURIComponent(email)}\`, {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ name, avatar, about })
            });
          }
          
          const result = await response.json();
          if (result.success) {
            showStatus('Profile saved!', 'success');
            localStorage.setItem('username', name);
          } else {
            showStatus('Error: ' + (result.error || 'Unknown error'), 'error');
          }
        } catch (err) {
          console.error('Failed to save:', err);
          showStatus('Failed to save profile', 'error');
        }
      }

      // ============================================
      // DELETE ACCOUNT
      // ============================================
      async function deleteAccount() {
        if (!confirm('Delete account? This cannot be undone.')) return;
        showStatus('Delete endpoint not implemented', 'error');
      }

      // ============================================
      // EVENT LISTENERS
      // ============================================
      document.getElementById('saveBtn')?.addEventListener('click', saveProfile);
      document.getElementById('deleteBtn')?.addEventListener('click', deleteAccount);

      // ============================================
      // LOAD PROFILE
      // ============================================
      loadProfile();
    })();
  </script>
</body>
</html>
