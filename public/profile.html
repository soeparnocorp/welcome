<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>READTalk</title>
  <style>
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    iframe { width: 100%; height: 100%; border: none; }
  </style>
</head>
<body>
  <iframe id="chatFrame" src="about:blank" allow="camera; microphone"></iframe>
  
  <script>    
    const params = new URLSearchParams(window.location.search);
    const userId = params.get('userId');
    const email = params.get('email');
    const username = params.get('username') || email?.split('@')[0] || 'Guest';
    
    if (!userId || !email) {      
      document.body.innerHTML = `<div style="padding:20px; text-align:center;"><h2>⛔ Missing Login Information</h2><p>Please <a href="/api/login">login</a> first.</p></div>`;
      throw new Error('Access denied');
    }
    
    localStorage.setItem('userId', userId);
    localStorage.setItem('email', email);
    localStorage.setItem('username', username);
    
    const iframe = document.getElementById('chatFrame');
    
    // Set iframe src
    iframe.src = `https://account.soeparnocorp.workers.dev?userId=${encodeURIComponent(userId)}&email=${encodeURIComponent(email)}&username=${encodeURIComponent(username)}`;
    
    // TUNGGU IFRAME SIAP, BARU KIRIM PERINTAH
    let messageSent = false;
    
    iframe.onload = () => {
      // Kirim PROFILE_READY dulu
      iframe.contentWindow.postMessage({
        type: 'PROFILE_READY',
        userId: userId,
        username: username
      }, 'https://account.soeparnocorp.workers.dev');
      
      // Tunggu sebentar, lalu kirim CREATE_USER_ROOM
      setTimeout(() => {
        if (!messageSent) {
          messageSent = true;
          iframe.contentWindow.postMessage({
            type: 'CREATE_USER_ROOM',
            userId: userId
          }, 'https://account.soeparnocorp.workers.dev');
        }
      }, 2000); // Kasih waktu index.html siap
    };
    
    // Terima konfirmasi
    window.addEventListener('message', (event) => {
      if (event.origin !== 'https://account.soeparnocorp.workers.dev') return;
      
      if (event.data.type === 'USER_ROOM_CREATED') {
        console.log(`✅ User room created: user${event.data.userId}`);
      }
      
      if (event.data.type === 'READY_FOR_ROOM') {
        // Index.html siap, kirim sekarang
        if (!messageSent) {
          messageSent = true;
          iframe.contentWindow.postMessage({
            type: 'CREATE_USER_ROOM',
            userId: userId
          }, 'https://account.soeparnocorp.workers.dev');
        }
      }
    });
  </script>
</body>
</html>
