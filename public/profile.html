<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>READTalk Profile</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      height: 100vh;
      overflow: hidden;
    }
    
    /* LAYER 1: FORM (sama persis dengan form di index.html) */
    #layer1 {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--bg-primary, white);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
      transition: opacity 0.3s;
      padding: 20px;
    }
    
    #layer1.hidden {
      opacity: 0;
      pointer-events: none;
    }
    
    .form-content {
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    
    .form-content h2 {
      margin-bottom: 24px;
      color: #ff0000;
    }
    
    .form-content input {
      width: 100%;
      height: 48px;
      border: 2px solid #e0e0e0;
      border-radius: 24px;
      padding: 0 20px;
      font-size: 16px;
      background: #f5f5f5;
      margin-bottom: 16px;
    }
    
    .form-content input:focus {
      border-color: #ff0000;
      outline: none;
    }
    
    .form-content button {
      height: 48px;
      border: none;
      border-radius: 24px;
      padding: 0 32px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      background: #ff0000;
      color: white;
      width: 100%;
    }
    
    .form-content button:hover {
      background: #cc0000;
    }
    
    /* LAYER 2: IFRAME (chatroom) */
    #layer2 {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 100;
    }
    
    #layer2 iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <!-- LAYER 1: FORM -->
  <div id="layer1">
    <div class="form-content">
      <h2>Welcome to READTalk</h2>
      <input type="text" id="room-name" placeholder="Room Name..." maxlength="14">
      <input type="text" id="name-input" placeholder="Your name" maxlength="32">
      <button id="check-in">Check In</button>
      <p style="margin-top: 20px; color: #666; font-size: 12px;">Private chat on the edge<br>with Cloudflare Durable Objects</p>
    </div>
  </div>
  
  <!-- LAYER 2: IFRAME (chatroom) -->
  <div id="layer2">
    <iframe id="chatFrame" src="about:blank" allow="camera; microphone"></iframe>
  </div>
  
  <script>
    // Ambil parameter dari URL
    const params = new URLSearchParams(window.location.search);
    const userId = params.get('userId');
    const email = params.get('email');
    
    if (!userId || !email) {
      document.body.innerHTML = `<div style="padding:20px; text-align:center;"><h2>⛔ Missing Login Information</h2></div>`;
      throw new Error('Access denied');
    }
    
    // Cek localStorage
    const savedRoom = localStorage.getItem('readtalk_room');
    const savedName = localStorage.getItem('readtalk_name');
    const savedUserId = localStorage.getItem('userId');
    const savedEmail = localStorage.getItem('email');
    
    const layer1 = document.getElementById('layer1');
    const layer2 = document.getElementById('layer2');
    const iframe = document.getElementById('chatFrame');
    const roomInput = document.getElementById('room-name');
    const nameInput = document.getElementById('name-input');
    const checkInBtn = document.getElementById('check-in');
    
    // Jika sudah pernah login dan punya data
    if (savedRoom && savedName && savedUserId === userId) {
      // Langsung ke layer 2
      layer1.classList.add('hidden');
      loadChatroom(userId, email, savedName, savedRoom);
    } else {
      // Tampilkan form
      layer1.classList.remove('hidden');
      
      // Isi form dengan data dari parameter
      nameInput.value = params.get('username') || email.split('@')[0] || '';
    }
    
    // Event check in
    checkInBtn.addEventListener('click', () => {
      const room = roomInput.value.trim();
      const name = nameInput.value.trim();
      
      if (!room || !name) {
        alert('Room name dan Your name harus diisi');
        return;
      }
      
      // Simpan ke localStorage
      localStorage.setItem('readtalk_room', room);
      localStorage.setItem('readtalk_name', name);
      localStorage.setItem('userId', userId);
      localStorage.setItem('email', email);
      
      // Sembunyikan form
      layer1.classList.add('hidden');
      
      // Muat chatroom
      loadChatroom(userId, email, name, room);
    });
    
    function loadChatroom(userId, email, name, room) {
      // Set iframe src dengan parameter
      iframe.src = `https://account.soeparnocorp.workers.dev?userId=${encodeURIComponent(userId)}&email=${encodeURIComponent(email)}&username=${encodeURIComponent(name)}`;
      
      // Kirim perintah buka room setelah iframe load
      iframe.onload = () => {
        setTimeout(() => {
          iframe.contentWindow.postMessage({
            type: 'OPEN_ROOM',
            roomName: room
          }, 'https://account.soeparnocorp.workers.dev');
        }, 1500);
      };
    }
    
    // Terima pesan dari chatroom
    window.addEventListener('message', (event) => {
      if (event.origin !== 'https://account.soeparnocorp.workers.dev') return;
      
      if (event.data.type === 'ROOM_OPENED') {
        console.log('✅ Room opened:', event.data.roomName);
      }
    });
  </script>
</body>
</html>
