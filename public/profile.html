<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>READTalk</title>
  <style>
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
    iframe { width: 100%; height: 100%; border: none; }
  </style>
</head>
<body>
  <iframe id="chatFrame" src="about:blank"></iframe>
  
  <script>
    // Data dari account.ts (di-inject)
    const { userId, email, username } = window.USER_DATA || {};
    
    if (!userId || !email) {
      window.location.href = '/';
    } else {
      // Simpan di localStorage
      localStorage.setItem('userId', userId);
      localStorage.setItem('email', email);      
      
      // Load chat
      document.getElementById('chatFrame').src = 
        `https://account.soeparnocorp.workers.dev?userId=${userId}&email=${encodeURIComponent(email)}&username=${encodeURIComponent(username)}`;
    }
  </script>
</body>
</html>
