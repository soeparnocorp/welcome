<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>READTalk - Chat</title>
  <style>
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
    iframe { width: 100%; height: 100%; border: none; }
  </style>
</head>
<body>
  <iframe id="chatFrame" src="about:blank" allow="camera; microphone"></iframe>
  
  <script>
    const params = new URLSearchParams(window.location.search);
    const userId = params.get('userId');
    const email = params.get('email');
    const username = params.get('username');
    const room = params.get('room');
    
    if (!userId || !email || !username || !room) {
      document.body.innerHTML = '<div>Missing parameters</div>';
      throw new Error('Missing parameters');
    }
    
    const iframe = document.getElementById('chatFrame');
    
    // Set iframe src ke workers.dev
    iframe.src = `https://account.soeparnocorp.workers.dev?userId=${encodeURIComponent(userId)}&email=${encodeURIComponent(email)}&username=${encodeURIComponent(username)}`;
    
    // Kirim perintah buka room setelah iframe load
    iframe.onload = () => {
      setTimeout(() => {
        iframe.contentWindow.postMessage({
          type: 'OPEN_ROOM',
          roomName: room
        }, 'https://account.soeparnocorp.workers.dev');
      }, 1500);
    };
    
    // Terima pesan dari workers.dev
    window.addEventListener('message', (event) => {
      if (event.origin !== 'https://account.soeparnocorp.workers.dev') return;
      console.log('Message from chat:', event.data);
    });
  </script>
</body>
</html>
