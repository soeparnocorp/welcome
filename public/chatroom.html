<script>
  // ... semua kode Anda ...
  
  // TAMBAHKAN LISTENER UNTUK POST MESSAGE
  window.addEventListener('message', (event) => {
    if (event.origin !== 'https://id-readtalk.pages.dev') return;
    
    if (event.data.type === 'OPEN_ROOM') {
      // Isi form room
      document.getElementById('room-name').value = event.data.roomName;
      document.getElementById('go-public').click();
      
      // Konfirmasi balik
      event.source.postMessage({
        type: 'ROOM_OPENED',
        roomName: event.data.roomName
      }, event.origin);
    }
  });
</script>
